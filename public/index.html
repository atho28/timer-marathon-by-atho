<!DOCTYPE html>
<html>
<head>
    <title>Display Running Time</title>
    <style>
        :root {
            --bg-color: #000000;
            --font-color: #ffffff;
            --font-size: 80px;
            --font-family: 'Segoe UI', sans-serif;
        }

        body { 
            background-color: var(--bg-color);
            background-size: cover;
            background-position: center;
            color: var(--font-color);
            font-family: var(--font-family);
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* --- STYLING TAB MENU --- */
        #settings-menu {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.95);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #444;
            color: white;
            z-index: 1000;
            width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateX(-120%); /* Hide by default */
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #settings-menu.visible {
            transform: translateX(0);
        }

        .menu-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #3d5afe;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1001;
        }

        .section { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .section label { display: block; font-size: 12px; margin-bottom: 5px; color: #aaa; }
        input, select { width: 100%; padding: 8px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; margin-bottom: 5px; }

        /* --- DISPLAY LAYOUT --- */
        #display-container { width: 90%; display: flex; flex-direction: column; gap: 30px; }
        .timer-row { display: flex; align-items: center; justify-content: space-between; }
        .label { font-size: calc(var(--font-size) * 0.4); opacity: 0.7; }
        .time { 
            font-size: calc(var(--font-size) * 1.5); 
            font-weight: bold; 
            /* Baris di bawah ini adalah kuncinya agar angka tidak bergetar */
            font-variant-numeric: tabular-nums; 
            -webkit-font-feature-settings: "tnum";
            font-feature-settings: "tnum";
    
            flex: 1; 
            text-align: right; 
            margin-right: 0%; 
            }
        .milidetik { font-size: 0.6em; opacity: 0.8; }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleMenu()">☰ MENU</button>

    <div id="settings-menu">
        <h3 style="margin-top:0">Display Settings</h3>
        
        <div class="section">
    <label>PILIH FONT STYLE</label>
    <select id="fontSelect" onchange="applyFont(this.value)">
        <optgroup label="Standard Fonts">
            <option value="'Segoe UI', sans-serif">Segoe UI (Default)</option>
            <option value="Arial, sans-serif">Arial</option>
            <option value="'Times New Roman', serif">Times New Roman</option>
            <option value="Verdana, sans-serif">Verdana</option>
            <option value="Courier New, monospace">Courier New</option>
        </optgroup>
        <optgroup label="Display Fonts (Pastikan Font Terinstall)">
            <option value="Impact, Charcoal, sans-serif">Impact (Bold Look)</option>
            <option value="'Bebas Neue', sans-serif">Bebas Neue</option>
            <option value="'Montserrat', sans-serif">Montserrat</option>
            <option value="'Roboto', sans-serif">Roboto</option>
            <option value="'Open Sans', sans-serif">Open Sans</option>
            <option value="Georgia, serif">Georgia</option>
        </optgroup>
        <optgroup label="Custom Input">
            <option value="custom">-- Ketik Manual (Custom) --</option>
        </optgroup>
    </select>
    
    <input type="text" id="customFontInput" placeholder="Ketik nama font spesifik..." 
           style="display:none; margin-top:5px;" oninput="applyFont(this.value)">
</div>

        <div class="section">
            <label>FONT COLOR & SIZE</label>
            <input type="color" onchange="applyColor(this.value)" value="#ffffff">
            <input type="range" min="20" max="250" value="80" oninput="applySize(this.value)">
        </div>

        <div class="section">
            <label>BACKGROUND COLOR (Solid)</label>
            <input type="color" onchange="applyBgColor(this.value)" value="#000000">
        </div>

        <div class="section">
        <label>BACKGROUND MEDIA (Image/Video)</label>
        <input type="file" id="bgInput" accept="image/*, video/mp4, video/webm" onchange="applyBgMedia(event)">
        <button onclick="clearBgMedia()" style="width:100%; margin-top:5px; font-size:10px;">Reset to Solid Color</button>
        </div>

        <button onclick="toggleMenu()" style="width:100%; background: #dc3545; color: white; border:none; padding:10px; border-radius:4px; cursor:pointer;">CLOSE</button>
    </div>

    <div id="display-container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localTimers = {};

        function toggleMenu() {
            document.getElementById('settings-menu').classList.toggle('visible');
        }

        // --- FUNGSI PENGATURAN TAMPILAN ---
        function applyFont(val) {
        const customInput = document.getElementById('customFontInput');
        
        if (val === 'custom') {
            customInput.style.display = 'block';
        } else {
            customInput.style.display = 'none';
            document.documentElement.style.setProperty('--font-family', val);
        }
    }
        function applyColor(val) { document.documentElement.style.setProperty('--font-color', val); }
        function applySize(val) { document.documentElement.style.setProperty('--font-size', val + 'px'); }
        function applyBgColor(val) { 
            document.body.style.backgroundImage = 'none';
            document.documentElement.style.setProperty('--bg-color', val); 
        }
        function applyBgMedia(event) {
    const file = event.target.files[0];
    const reader = new FileReader();
    const videoElement = document.getElementById('bgVideo');

    reader.onload = function(e) {
        if (file.type.includes('video')) {
            // Jika file adalah Video
            document.body.style.backgroundImage = 'none';
            videoElement.src = e.target.result;
            videoElement.style.display = 'block';
            videoElement.play();
        } else {
            // Jika file adalah Gambar
            videoElement.style.display = 'none';
            videoElement.pause();
            document.body.style.backgroundImage = `url('${e.target.result}')`;
        }
    }
    
    if (file) {
        reader.readAsDataURL(file);
    }
}

function clearBgMedia() {
    const videoElement = document.getElementById('bgVideo');
    videoElement.style.display = 'none';
    videoElement.pause();
    videoElement.src = "";
    document.body.style.backgroundImage = 'none';
}
        // --- LOGIKA TIMER ---
        socket.on('sync', (data) => { localTimers = data; });

        function update() {
            const container = document.getElementById('display-container');
            if (!container) return;
            
            let content = '';
            for (let id in localTimers) {
                let t = localTimers[id];
                let ms = t.elapsed + (t.isRunning ? Date.now() - t.startTime : 0);
                
                let h = Math.floor(ms / 3600000).toString().padStart(2, '0');
                let m = Math.floor((ms % 3600000) / 60000).toString().padStart(2, '0');
                let s = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
                let ms_digit = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');

                content += `
                    <div class="timer-row">
                        <div class="label">${t.name}</div>
                        <div class="time">
                            ${h}:${m}:${s}<span class="milidetik">.${ms_digit}</span>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = content;
            requestAnimationFrame(update);
        }
        update();
    </script>
<video id="bgVideo" autoplay muted loop 
style="position: fixed; top: 0; left: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; display: none;">
</video>
</body>
</html>
