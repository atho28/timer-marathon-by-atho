<!DOCTYPE html>
<html>
<head>
    <title>Master Admin Control</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            padding: 30px;
			justify-content: center; /* Mengetengahkan secara horizontal */
            align-items: center;     /* Mengetengahkan secara vertikal */
        }
        .card { 
            background: #1e1e1e; 
            padding: 25px; 
            margin-bottom: 25px;
			margin-right: 200px;
			min-width: 120px;
            border-radius: 12px; 
            border-left: 6px solid #3d5afe; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
			display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
        }
        .name-input {
            background: White-Grey; 
            border: 1px #555; 
            color: #000; 
            font-size: 2rem;
			font-weight; bold;
			align:center;			
            padding: 5px; 
            width: 80%;
            border-radius: 5px;
        }
        .timer-val { 
            font-size: 60px; 
            font-family: 'Tahoma', monospace; 
            color: #00ff00; 
            background: #000; 
            padding: 30px 120px; 
            border-radius: 8px; 
            border: 2px solid #333; 
            width: 300px; 
            text-align: center;
        }
        button { 
            padding: 12px 24px; cursor: pointer; border: none; border-radius: 8px; 
            font-weight: bold; transition: all 0.2s;
        }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn-start { background: #2e7d32; color: white; }
        .btn-pause { background: #ffa000; color: #000; }
        .btn-edit { background: #0288d1; color: white; }
        .btn-reset { background: #c62828; color: white; }
        .btn-group { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <h1>Marathon Timer Control by Athoillah</h1>
    <div id="controls"></div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
<script>
  const socket = io(); // Biarkan kosong agar otomatis mendeteksi URL Railway

  let localTimers = {};
  let isRendered = false;

  socket.on('connect', () => {
    console.log('Sukses terhubung ke Railway!');
    socket.emit('requestSync');
  });

  socket.on('sync', (data) => {
    console.log('Data diterima:', data);
    localTimers = data;
    // Panggil fungsi gambar UI
    initialRender(); 
  });

  function initialRender() {
    const container = document.getElementById('controls');
    if (!container) return;
    
    container.innerHTML = '';
    for (let id in localTimers) {
      const t = localTimers[id];
      const div = document.createElement('div');
      div.className = 'card';
      div.style = "border: 1px solid #ccc; margin: 10px; padding: 10px; border-radius: 8px;";
      div.innerHTML = `
        <h3>${t.name}</h3>
        <button onclick="sendControl('${id}', 'start')">Start</button>
        <button onclick="sendControl('${id}', 'pause')">Pause</button>
        <button onclick="sendControl('${id}', 'reset')">Reset</button>
      `;
      container.appendChild(div);
    }
  }

  function sendControl(id, command) {
    socket.emit('controlTimer', { id, command });
  }
</script>
</body>
</html>
